<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Detection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f4f9;
      color: #333;
    }
    .card {
      max-width: 600px;
      padding: 20px;
      margin: auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .status {
      font-size: 1.2rem;
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
    }
    .chrome {
      background: #e8f5ff;
      border: 1px solid #b3e5fc;
      color: #0277bd;
    }
    .other {
      background: #fff1f0;
      border: 1px solid #ffcccb;
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Chrome Browser Code</h1>
    <p>This page detects whether the visitor is using Google Chrome.</p>
    <div id="browserStatus" class="status">Detecting browser...</div>
    <pre><code>const isChrome = /Chrome/.test(navigator.userAgent) &amp;&amp; /Google Inc/.test(navigator.vendor);
</code></pre>
  </div>
  <script>
    function detectChrome() {
      const userAgent = navigator.userAgent;
      const vendor = navigator.vendor;
      const isChrome = /Chrome/.test(userAgent) && /Google Inc/.test(vendor);
      const status = document.getElementById('browserStatus');
      if (isChrome) {
        status.textContent = 'You are using Google Chrome.';
        status.classList.add('chrome');
      } else {
        status.textContent = 'You are not using Google Chrome.';
        status.classList.add('other');
      }
    }
    detectChrome();
  </script>
</body>
</html>
